<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Leaderboard - Modern White</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #ffffff;
        color: #202124;
        font-family: 'Kanit', sans-serif;
        margin: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
      }
      .header-section { 
        width: 100%; 
        text-align: center; 
        padding: 40px 0; 
        background-color: #FFCC00; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      h1 { 
        font-weight: 700; 
        font-size: 3.5rem; 
        color: #ffffff; 
        letter-spacing: 2px; 
        margin: 0; 
        text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      }
      .leaderboard-card { 
        width: 95%; 
        max-width: 1800px; 
        background: #fff; 
        margin-top: 20px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
      }
      .scroll-viewport { 
        flex-grow: 1;
        overflow: hidden; 
        position: relative; 
        border-top: 2px solid #f0f0f0; 
      }
      table { width: 100%; border-collapse: collapse; table-layout: fixed; }
      
      th:nth-child(1) { width: 10%; } 
      th:nth-child(2) { width: 40%; } 
      th:nth-child(3) { width: 15%; } 
      th:nth-child(4) { width: 15%; } 
      th:nth-child(5) { width: 20%; } 

      th { font-size: 1.5rem; padding: 20px 10px !important; border-bottom: 3px solid #1a73e8 !important; color: #1a73e8; text-align: center; background: white; }
      tbody td { padding: 15px 10px !important; font-size: 1.8rem; border-bottom: 1px solid #f1f3f4 !important; text-align: center; vertical-align: middle; }
      
      .total-score { font-weight: 700; color: #d93025; font-size: 2.2rem; }
      #scroller-content { position: absolute; width: 100%; top: 0; transition: opacity 0.5s ease-in; }
      .rank-badge { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: #f8f9fa; margin: 0 auto; font-weight: 700; border: 1px solid #dee2e6; font-size: 1.6rem; }
      
      .rank-1 { background: linear-gradient(135deg, #ffd700, #ffac00); color: #fff; border: none; box-shadow: 0 4px 10px rgba(255,172,0,0.4); }
      .rank-2 { background: linear-gradient(135deg, #c0c0c0, #959595); color: #fff; border: none; }
      .rank-3 { background: linear-gradient(135deg, #cd7f32, #a05a2c); color: #fff; border: none; }
      
      .card-footer-clean { padding: 20px 0; width: 100%; text-align: center; color: #5f6368; background: #fff; }
    </style>
  </head>
  <body>
    <div class="header-section"><h1>LEGO COMPETITION LEADERBOARD</h1></div>
    <div class="leaderboard-card">
      <div class="scroll-viewport" id="viewport">
        <div id="scroller-content">
          <table class="table mb-0">
            <thead>
              <tr><th>Rank</th><th style="text-align: left;">Team Name</th><th>Auto</th><th>Manual</th><th>Total</th></tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
      <div class="card-footer-clean">
        <p class="mb-0" style="font-size: 18px;">Organized by <strong>Gammaco (Thailand) Co., LTD.</strong></p>
      </div>
    </div>

    <script>
      // 🔗 วาง Web App URL ที่ก็อปปี้มาที่นี่
      const API_URL = 'YOUR_GAS_WEB_APP_URL_HERE'; 
      
      let scrollInterval;
      const waitTime = 10000; 

      async function loadData() {
        try {
          const response = await fetch(API_URL);
          const data = await response.json();
          renderTable(data);
        } catch (error) {
          console.error("Error fetching data:", error);
        }
      }

      function renderTable(data) {
        const tbody = document.getElementById('table-body');
        const content = document.getElementById('scroller-content');
        
        tbody.innerHTML = data.map(item => {
          let rankClass = (item.rank == 1) ? 'rank-1' : (item.rank == 2) ? 'rank-2' : (item.rank == 3) ? 'rank-3' : '';
          return `<tr>
            <td><div class="rank-badge ${rankClass}">${item.rank}</div></td>
            <td style="text-align: left;">${item.teamName}</td>
            <td style="font-weight: 500;">${item.autoScore}</td>
            <td style="font-weight: 500;">${item.manualScore}</td>
            <td class="total-score">${item.totalScore}</td>
          </tr>`;
        }).join('');

        content.style.opacity = "1";
        startBottomToTopScroll();
      }

      async function startBottomToTopScroll() {
        const container = document.getElementById('viewport');
        const content = document.getElementById('scroller-content');
        clearInterval(scrollInterval);
        
        let maxScroll = content.offsetHeight - container.offsetHeight;
        
        if (maxScroll > 0) {
          content.style.top = '-' + maxScroll + 'px';
        } else {
          content.style.top = "0px";
          return;
        }

        await new Promise(r => setTimeout(r, waitTime));

        const scrollSpeed = 0.8; 
        scrollInterval = setInterval(() => {
          let currentTop = parseFloat(content.style.top || 0);
          if (currentTop < 0) {
            content.style.top = (currentTop + scrollSpeed) + "px";
          } else {
            content.style.top = "0px";
            clearInterval(scrollInterval);
            setTimeout(() => { startBottomToTopScroll(); }, waitTime);
          }
        }, 30);
      }

      window.onload = loadData;
      // รีเฟรชข้อมูลจาก Google Sheets ทุก 1 นาที
      setInterval(loadData, 60000); 
    </script>
  </body>
</html>
